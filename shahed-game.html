<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Збий Шахед</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; overflow: hidden;
    width: 100%; height: 100%;
    background: #140d33;
    font-family: 'Press Start 2P', monospace;
    touch-action: none;
    overscroll-behavior: none;
  }
  #gameCanvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }
  #overlay {
    position: fixed; inset: 0;
    display: none;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 22px;
    background: rgba(8, 6, 32, 0.9);
    color: #fff;
    text-align: center;
    z-index: 10;
    padding: 24px;
    box-sizing: border-box;
  }
  #overlay.show { display: flex; }
  #overlay h1 {
    font-size: 16px;
    color: #ff4d4d;
    margin: 0;
    letter-spacing: 1px;
    line-height: 1.6;
    text-shadow: 2px 2px 0 #5c0000;
  }
  #overlay p {
    font-size: 13px;
    margin: 0;
    color: #ffe9a8;
  }
  #waveLabel {
    font-size: 10px;
    color: #9bb8ff;
  }
  #restartBtn {
    font-family: 'Press Start 2P', monospace;
    background: #ff3b3b;
    color: #fff;
    border: 3px solid #fff;
    padding: 14px 20px;
    font-size: 12px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 0 #8c0000;
    margin-top: 8px;
  }
  #restartBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #8c0000; }

  #shareBtn {
    font-family: 'Press Start 2P', monospace;
    background: #2ea6ff;
    color: #fff;
    border: 3px solid #fff;
    padding: 12px 18px;
    font-size: 11px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 0 #0d5b91;
    display: none;
  }
  #shareBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #0d5b91; }

  #startOverlay {
    position: fixed; inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    background: rgba(8, 6, 32, 0.92);
    color: #fff;
    text-align: center;
    z-index: 11;
    padding: 24px;
    box-sizing: border-box;
  }
  #startOverlay h1 {
    font-size: 17px;
    color: #ffd24d;
    margin: 0 0 6px 0;
    line-height: 1.7;
    text-shadow: 2px 2px 0 #5c3d00;
  }
  #startOverlay p {
    font-size: 11px;
    line-height: 1.9;
    color: #cfd6ff;
    max-width: 320px;
  }
  #startBtn {
    font-family: 'Press Start 2P', monospace;
    background: #3b6dff;
    color: #fff;
    border: 3px solid #fff;
    padding: 14px 24px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 4px 0 #1c3a91;
    margin-top: 6px;
  }
  #startBtn:active { transform: translateY(3px); box-shadow: 0 1px 0 #1c3a91; }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<div id="startOverlay">
  <h1>ЗБИЙ&nbsp;ШАХЕД</h1>
  <p>Рухай палець по екрану, щоб водити турель.<br>Вона стріляє автоматично.<br>Формація поступово спускається, а окремі дрони пікірують — не дай їм долетіти!<br>Лови ⚡ за збитий дрон — пришвидшує стрільбу.</p>
  <button id="startBtn">ГРАТИ</button>
</div>

<div id="overlay">
  <h1 id="gameOverTitle">ГРУ ЗАВЕРШЕНО</h1>
  <p id="finalScore">ЗБИТО: 0</p>
  <p id="waveLabel">Хвиля: 1</p>
  <button id="restartBtn">ЩЕ РАЗ</button>
  <button id="shareBtn">НАДІСЛАТИ РЕЗУЛЬТАТ У ЧАТ</button>
</div>

    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    layoutFormation();
  }

  /* ---------- image loading ---------- */
  const images = {};
  let loadedCount = 0;
  const assetKeys = Object.keys(ASSET_SOURCES);

  function loadImages(onDone) {
    assetKeys.forEach((key) => {
      const img = new Image();
      img.onload = () => {
        loadedCount++;
        if (loadedCount === assetKeys.length) onDone();
      };
      img.src = ASSET_SOURCES[key];
      images[key] = img;
    });
  }

  /* ---------- game state ---------- */
  const MAX_LIVES = 4;
  let score = 0;
  let lives = MAX_LIVES;
  let wave = 1;
  let running = false;
  let gameOver = false;

  let drones = [];
  let bullets = [];
  let explosions = [];

  let formationPhase = 0;
  let formationOscAmplitude = 8;   // gentle collective sway, small so columns stay aimable
  let formationOscSpeed = 0.7;     // rad/sec
  let formationOffsetY = 0;        // slow continuous descent toward the turret
  let formationDescentSpeed = 7;   // px/sec, grows with wave

  let cols = 5, rows = 4;
  let droneW = 0, droneH = 0, gridStartX = 0, gridStartY = 0, spacingX = 0, spacingY = 0;

  const turret = { x: 0, targetX: 0, w: 0, h: 0, y: 0, tilt: 0 };

  let lastShotTime = 0;
  const SHOT_INTERVAL_BASE = 420; // ms

  const BULLET_SPEED = 760; // px/sec
  let bulletW = 0, bulletH = 0;

  const EXPLOSION_DURATION = 360; // ms

  // diving attack mechanic
  let diveTimer = 0;
  let diveIntervalMin = 1600, diveIntervalMax = 2600; // ms, narrows with wave
  let diveSpeed = 210; // px/sec, grows with wave

  // power-ups: fire-rate boost
  let powerups = [];
  const POWERUP_DROP_CHANCE = 0.16;
  const POWERUP_FALL_SPEED = 130; // px/sec
  const POWERUP_BOOST_DURATION = 8000; // ms
  const POWERUP_FIRE_MULTIPLIER = 2.2;
  let fireBoostUntil = 0;   // timestamp (ms, rAF clock) until which fire rate is boosted
  let powerupSize = 0;

  /* ---------- layout ---------- */
  function layoutFormation() {
    cols = W < 420 ? 5 : 6;
    droneW = W * 0.135;
    droneH = droneW * (386 / 300);

    const usableW = W * 0.86;
    spacingX = usableW / (cols - 1 || 1);
    gridStartX = (W - usableW) / 2;

    spacingY = droneH * 1.05;
    gridStartY = H * 0.13;

    turret.w = W * 0.20;
    turret.h = turret.w * (255 / 300);
    turret.y = H * 0.80;
    if (turret.x === 0) turret.x = W / 2;
    if (turret.targetX === 0) turret.targetX = W / 2;

    bulletW = Math.max(6, W * 0.018);
    bulletH = bulletW * (324 / 120);

    powerupSize = Math.max(26, W * 0.09);
  }

  /* ---------- formation spawn ---------- */
  function spawnWave() {
    drones = [];
    rows = Math.min(3 + Math.ceil(wave / 2), 6);
    let id = 0;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (wave > 1 && r === rows - 1 && Math.random() < 0.3) continue;
        drones.push({
          id: id++,
          col: c,
          row: r,
          alive: true,
          hoverPhase: Math.random() * Math.PI * 2,
          diving: false,
          x: 0, y: 0,      // populated below / during dive
          vx: 0, vy: 0,
        });
      }
    }
    formationPhase = Math.random() * Math.PI * 2;
    formationOscSpeed = 0.6 + wave * 0.04;
    formationOffsetY = 0;
    formationDescentSpeed = 7 + (wave - 1) * 2.4;

    diveIntervalMin = Math.max(900, 2200 - (wave - 1) * 150);
    diveIntervalMax = Math.max(1400, 3400 - (wave - 1) * 180);
    diveSpeed = 150 + (wave - 1) * 18;
    diveTimer = diveIntervalMin + Math.random() * (diveIntervalMax - diveIntervalMin);
    if (wave === 1) diveTimer += 1800;

    waveLabelEl.textContent = 'Хвиля: ' + wave;
  }

  function formationPos(d) {
    const baseX = gridStartX + d.col * spacingX;
    const baseY = gridStartY + d.row * spacingY;
    const sway = Math.sin(formationPhase + d.row * 0.4) * formationOscAmplitude;
    const hover = Math.sin(formationPhase * 1.7 + d.hoverPhase) * (droneH * 0.05);
    return { x: baseX + sway, y: baseY + hover + formationOffsetY };
  }

  function dronePos(d) {
    if (d.diving) return { x: d.x, y: d.y };
    return formationPos(d);
  }

  function startDive(d) {
    const start = formationPos(d);
    d.diving = true;
    d.x = start.x;
    d.y = start.y;
    // aim roughly at the turret's current position, with some spread so it's not unfair
    const aimX = turret.x + (Math.random() - 0.5) * turret.w * 1.4;
    const dx = aimX - start.x;
    const distY = (turret.y - start.y) || 1;
    const t = distY / diveSpeed; // time to reach turret line at current diveSpeed
    d.vx = dx / t;
    d.vy = diveSpeed;
  }

  /* ---------- input ---------- */
  function setTargetFromClientX(clientX) {
    const half = turret.w / 2;
    turret.targetX = Math.max(half + 6, Math.min(W - half - 6, clientX));
  }

  let pointerDown = false;
  canvas.addEventListener('pointerdown', (e) => {
    pointerDown = true;
    setTargetFromClientX(e.clientX);
  });
  canvas.addEventListener('pointermove', (e) => {
    if (pointerDown) setTargetFromClientX(e.clientX);
  });
  window.addEventListener('pointerup', () => { pointerDown = false; });
  window.addEventListener('pointercancel', () => { pointerDown = false; });

  /* ---------- bullets / explosions ---------- */
  function fireBullet() {
    bullets.push({
      x: turret.x,
      y: turret.y - turret.h * 0.55,
    });
  }

  function spawnExplosion(x, y) {
    explosions.push({ x, y, age: 0 });
  }

  /* ---------- collisions ---------- */
  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return Math.abs(ax - bx) < (aw + bw) / 2 && Math.abs(ay - by) < (ah + bh) / 2;
  }

  /* ---------- update ---------- */
  let lastTime = 0;

  function update(dt, now) {
    if (!running || gameOver) return;

    formationPhase += dt * formationOscSpeed;
    formationOffsetY += dt * formationDescentSpeed;

    // turret smoothing
    const smoothing = 1 - Math.pow(0.001, dt);
    turret.tilt = (turret.targetX - turret.x) * 0.04;
    turret.x += (turret.targetX - turret.x) * smoothing;

    // pick a new diver from time to time
    diveTimer -= dt * 1000;
    if (diveTimer <= 0) {
      const candidates = drones.filter((d) => d.alive && !d.diving);
      if (candidates.length > 0) {
        const pick = candidates[Math.floor(Math.random() * candidates.length)];
        startDive(pick);
      }
      diveTimer = diveIntervalMin + Math.random() * (diveIntervalMax - diveIntervalMin);
    }

    // move divers, check if they reach the turret line
    const dangerY = turret.y - turret.h * 0.2;
    for (const d of drones) {
      if (!d.alive || !d.diving) continue;
      d.x += d.vx * dt;
      d.y += d.vy * dt;
      if (d.y > dangerY) {
        d.alive = false;
        lives = Math.max(0, lives - 1);
        spawnExplosion(d.x, Math.min(d.y, turret.y - turret.h * 0.35));
        if (lives <= 0) {
          triggerGameOver('ЗБИТО: ' + score);
          return;
        }
      }
    }

    // formation breach: if the whole grid descends far enough, the city is overrun
    const breachY = turret.y - turret.h * 0.15;
    for (const d of drones) {
      if (!d.alive || d.diving) continue;
      const p = formationPos(d);
      if (p.y + droneH / 2 > breachY) {
        triggerGameOver('ДРОНИ ПРОРВАЛИ ОБОРОНУ', 'ЗБИТО: ' + score);
        return;
      }
    }

    // firing (boosted by an active power-up)
    const boosted = now < fireBoostUntil;
    const fireMultiplier = boosted ? POWERUP_FIRE_MULTIPLIER : 1;
    const interval = Math.max(110, (SHOT_INTERVAL_BASE - wave * 18) / fireMultiplier);
    if (now - lastShotTime > interval) {
      lastShotTime = now;
      fireBullet();
    }

    // bullets move
    for (const b of bullets) {
      b.y -= BULLET_SPEED * dt;
    }
    bullets = bullets.filter((b) => b.y > -bulletH);

    // collisions
    for (const b of bullets) {
      if (b._hit) continue;
      for (const d of drones) {
        if (!d.alive) continue;
        const p = dronePos(d);
        if (rectsOverlap(b.x, b.y, bulletW, bulletH, p.x, p.y, droneW * 0.8, droneH * 0.8)) {
          d.alive = false;
          b._hit = true;
          score++;
          spawnExplosion(p.x, p.y);
          if (Math.random() < POWERUP_DROP_CHANCE) {
            powerups.push({ x: p.x, y: p.y, collected: false });
          }
          break;
        }
      }
    }
    bullets = bullets.filter((b) => !b._hit);

    // power-ups: fall toward the turret, collect on overlap
    for (const pu of powerups) {
      pu.y += POWERUP_FALL_SPEED * dt;
      const turretHitW = turret.w * 0.75;
      const turretHitH = turret.h * 0.6;
      if (rectsOverlap(pu.x, pu.y, powerupSize, powerupSize, turret.x, turret.y - turret.h * 0.25, turretHitW, turretHitH)) {
        pu.collected = true;
        fireBoostUntil = now + POWERUP_BOOST_DURATION;
      }
    }
    powerups = powerups.filter((pu) => !pu.collected && pu.y < H + powerupSize);

    // explosions age
    for (const ex of explosions) ex.age += dt * 1000;
    explosions = explosions.filter((ex) => ex.age < EXPLOSION_DURATION);

    // wave clear check
    if (drones.length > 0 && drones.every((d) => !d.alive)) {
      wave++;
      spawnWave();
    }
  }

  function triggerGameOver(titleOrScore, maybeScore) {
    gameOver = true;
    running = false;
    if (maybeScore !== undefined) {
      gameOverTitleEl.textContent = titleOrScore;
      finalScoreEl.textContent = maybeScore;
    } else {
      gameOverTitleEl.textContent = 'ГРУ ЗАВЕРШЕНО';
      finalScoreEl.textContent = titleOrScore;
    }
    lastResult = { score, wave };
    overlay.classList.add('show');
  }

  /* ---------- render ---------- */
  function drawBackground() {
    const img = images.background;
    if (!img.complete || img.naturalWidth === 0) return;
    const imgRatio = img.naturalWidth / img.naturalHeight;
    const screenRatio = W / H;
    let dw, dh, dx, dy;
    if (screenRatio > imgRatio) {
      dw = W;
      dh = W / imgRatio;
      dx = 0;
      dy = (H - dh) / 2;
    } else {
      dh = H;
      dw = H * imgRatio;
      dy = 0;
      dx = (W - dw) / 2;
    }
    ctx.drawImage(img, dx, dy, dw, dh);
  }

  function drawHud() {
    const barH = Math.max(46, H * 0.07);
    ctx.fillStyle = 'rgba(20, 16, 64, 0.78)';
    ctx.fillRect(0, 0, W, barH);
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, barH);
    ctx.lineTo(W, barH);
    ctx.stroke();

    const boosted = lastTime < fireBoostUntil;

    ctx.fillStyle = '#ffffff';
    ctx.font = Math.max(13, W * 0.034) + 'px "Press Start 2P", monospace';
    ctx.textBaseline = 'middle';
    ctx.textAlign = 'left';
    const scoreText = 'ЗБИТО:' + score;
    ctx.fillText(scoreText, W * 0.035, barH / 2);

    if (boosted) {
      const tw = ctx.measureText(scoreText).width;
      ctx.fillStyle = '#ffcc33';
      ctx.fillText(' \u26A1', W * 0.035 + tw, barH / 2);

      const frac = Math.max(0, Math.min(1, (fireBoostUntil - lastTime) / POWERUP_BOOST_DURATION));
      const stripH = Math.max(3, barH * 0.06);
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(0, barH - stripH, W, stripH);
      ctx.fillStyle = '#ffcc33';
      ctx.fillRect(0, barH - stripH, W * frac, stripH);
    }

    const heartSize = Math.max(16, W * 0.05);
    ctx.font = heartSize + 'px serif';
    ctx.textAlign = 'right';
    for (let i = 0; i < MAX_LIVES; i++) {
      const xPos = W - 0.03 * W - i * (heartSize * 1.05);
      ctx.globalAlpha = i < lives ? 1 : 0.25;
      ctx.fillText('❤', xPos, barH / 2 + 2);
    }
    ctx.globalAlpha = 1;
  }

  function drawDrones() {
    const img = images.shahed;
    for (const d of drones) {
      if (!d.alive) continue;
      const p = dronePos(d);
      if (d.diving) {
        const angle = Math.max(-0.35, Math.min(0.35, d.vx / 900));
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(angle);
        ctx.drawImage(img, -droneW / 2, -droneH / 2, droneW, droneH);
        ctx.restore();
      } else {
        ctx.drawImage(img, p.x - droneW / 2, p.y - droneH / 2, droneW, droneH);
      }
    }
  }

  function drawTurret() {
    const img = images.turret;
    ctx.save();
    ctx.translate(turret.x, turret.y);
    ctx.rotate(turret.tilt * 0.05);
    ctx.drawImage(img, -turret.w / 2, -turret.h / 2, turret.w, turret.h);
    ctx.restore();
  }

  function drawBullets() {
    const img = images.shot;
    for (const b of bullets) {
      ctx.drawImage(img, b.x - bulletW / 2, b.y - bulletH, bulletW, bulletH);
    }
  }

  function drawExplosions() {
    const img = images.boom;
    for (const ex of explosions) {
      const t = ex.age / EXPLOSION_DURATION;
      const size = droneW * (0.9 + t * 0.6);
      ctx.globalAlpha = Math.max(0, 1 - t);
      ctx.drawImage(img, ex.x - size / 2, ex.y - size / 2, size, size);
      ctx.globalAlpha = 1;
    }
  }

  function drawPowerups(now) {
    for (const pu of powerups) {
      const pulse = 1 + Math.sin(now * 0.006 + pu.x) * 0.12;
      const size = powerupSize * pulse;
      ctx.save();
      ctx.translate(pu.x, pu.y);
      ctx.beginPath();
      ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
      const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, size / 2);
      grad.addColorStop(0, 'rgba(255, 230, 120, 0.95)');
      grad.addColorStop(1, 'rgba(255, 160, 0, 0.15)');
      ctx.fillStyle = grad;
      ctx.fill();
      ctx.strokeStyle = '#ffcc33';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.font = (size * 0.62) + 'px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#3a2200';
      ctx.fillText('\u26A1', 0, size * 0.04);
      ctx.restore();
    }
  }

  function render() {
    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawDrones();
    drawExplosions();
    drawPowerups(lastTime);
    drawBullets();
    drawTurret();
    drawHud();
  }

  /* ---------- main loop ---------- */
  function loop(ts) {
    if (!lastTime) lastTime = ts;
    let dt = (ts - lastTime) / 1000;
    dt = Math.min(dt, 0.05); // clamp on tab-switch lag
    lastTime = ts;

    update(dt, ts);
    render();

    requestAnimationFrame(loop);
  }

  /* ---------- game flow ---------- */
  function resetGame() {
    score = 0;
    lives = MAX_LIVES;
    wave = 1;
    bullets = [];
    explosions = [];
    powerups = [];
    fireBoostUntil = 0;
    gameOver = false;
    lastShotTime = 0;
    turret.x = W / 2;
    turret.targetX = W / 2;
    spawnWave();
    overlay.classList.remove('show');
    running = true;
  }

  startBtn.addEventListener('click', () => {
    startOverlay.style.display = 'none';
    resetGame();
  });

  restartBtn.addEventListener('click', () => {
    resetGame();
  });

  shareBtn.addEventListener('click', () => {
    if (!tg) return;
    tg.sendData(JSON.stringify(lastResult));
  });

  window.addEventListener('resize', resize);
  window.addEventListener('orientationchange', resize);
  if (tg && typeof tg.onEvent === 'function') {
    tg.onEvent('viewportChanged', resize);
  }

  /* ---------- boot ---------- */
  resize();
  loadImages(() => {
    requestAnimationFrame(loop);
  });

})();
</script>
</body>
</html>
